# E2E 测试账户 / E2E Test Accounts

**用途**: `human-e2e-tester` 技能专用测试账户，所有用户必须属于同一组织以便进行 RBAC 数据范围测试。

**权威来源**: `backend/database/schema/schema_manager.py` 中的初始化数据

