## 测试数据约束 / Test Data Constraint

所有 E2E 测试必须**仅使用**以下测试工装数据：

| 字段 | 值 |
|------|-----|
| 序列号 | `T000001` |
| 工装图号 | `Tooling_IO_TEST` |
| 工装名称 | `测试用工装` |
| 机型 | `测试机型` |

**禁止使用其他工装数据进行测试！**
