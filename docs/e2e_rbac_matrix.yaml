## 角色定义 / Role Definitions

| 角色 ID | 角色名 | 描述 | 组织范围 |
|---------|--------|------|---------|
| `ROLE_SYS_ADMIN` | 系统管理员 | 系统管理员，拥有所有权限 | ALL |
| `ROLE_TEAM_LEADER` | 班组长 | 创建订单、出库最终确认 | SELF, ORG |
| `ROLE_KEEPER` | 保管员 | 确认明细、拒绝订单、入库最终确认 | ORG, ASSIGNED |
| `ROLE_PLANNER` | 计划员 | 可创建和提交工装订单 | ORG, ORG_AND_CHILDREN |
| `ROLE_PRODUCTION_PREP` | 生产准备工 | 运输工装，负责运输执行 | SELF, ORG |
| `ROLE_AUDITOR` | 审计员 | 审计员，查看日志和报表 | ALL |
