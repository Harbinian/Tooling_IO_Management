## API 端点映射 / API Endpoint Mapping

| 权限 | 资源 | 操作 | API 端点 | 方法 |
|------|------|------|---------|------|
| `dashboard:view` | dashboard | view | `/api/dashboard/stats` | GET |
| `tool:search` | tool | search | `/api/tools/search` | GET |
| `tool:view` | tool | view | `/api/tools/<tool_code>` | GET |
| `tool:location_view` | tool | location_view | `/api/tools/<tool_code>/location` | GET |
| `tool:status_update` | tool | status_update | `/api/tools/batch-status` | POST |
| `order:create` | order | create | `/api/tool-io-orders` | POST |
| `order:view` | order | view | `/api/tool-io-orders/<order_no>` | GET |
| `order:list` | order | list | `/api/tool-io-orders` | GET |
| `order:submit` | order | submit | `/api/tool-io-orders/<order_no>/submit` | POST |
| `order:keeper_confirm` | order | keeper_confirm | `/api/tool-io-orders/<order_no>/keeper-confirm` | POST |
| `order:final_confirm` | order | final_confirm | `/api/tool-io-orders/<order_no>/final-confirm` | POST |
| `order:cancel` | order | cancel | `/api/tool-io-orders/<order_no>/cancel` | POST |
| `order:delete` | order | delete | `/api/tool-io-orders/<order_no>` | DELETE |
| `order:transport_execute` | order | transport_execute | `/api/tool-io-orders/<order_no>/transport-start` | POST |
| `notification:view` | notification | view | `/api/notifications` | GET |
| `notification:create` | notification | create | `/api/notifications` | POST |
| `notification:send_feishu` | notification | send_feishu | `/api/tool-io-orders/<order_no>/notify-transport` | POST |
| `log:view` | log | view | `/api/system/logs` | GET |
| `admin:user_manage` | admin | user_manage | `/api/admin/users` | GET/POST/PUT/DELETE |
| `admin:role_manage` | admin | role_manage | `/api/admin/roles` | GET/POST/PUT/DELETE |

